version: '3.8'

services:

  postgres-diplomas:
    image: postgres:15
    container_name: postgres-diplomas
    environment:
      POSTGRES_DB: diplomas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: passer
    ports:
      - "5435:5432"
    networks:
      - diplomas-network

  diplomas-service:
    image: ngoundje/diplomas-service:latest
    container_name: diplomas-service
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-diplomas:5432/diplomas_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: passer
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      - postgres-diplomas
    networks:
      - diplomas-network

networks:
  diplomas-network:
    driver: bridge